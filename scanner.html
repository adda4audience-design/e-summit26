<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gate Scanner | E-Summit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script> 
    <style>
        :root { 
            --bg-color: #030101; --panel-bg: rgba(12, 3, 3, 0.85);
            --brand-red: #e62b2b; --brand-yellow: #fca311; --text-white: #f5f5f5; 
        }
        
        body { 
            background-color: var(--bg-color); color: var(--text-white); 
            font-family: 'Montserrat', sans-serif; margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(rgba(230, 43, 43, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(230, 43, 43, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        .scanner-wrapper { 
            width: 100%; max-width: 500px; margin-top: 2vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--brand-red); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 1.5rem; }
        .header p { color: #888; font-size: 0.8rem; text-transform: uppercase; margin-top: 5px; font-weight: 600;}

        /* Scanner Box Styling */
        #reader { 
            width: 100%; background: #000; border: 2px solid var(--brand-red); 
            border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(230,43,43,0.2); 
        }
        
        /* Overriding html5-qrcode default ugly styles */
        #reader img { display: none; }
        #reader button { 
            background: var(--brand-yellow); color: #000; border: none; padding: 10px 15px; 
            border-radius: 4px; font-weight: 800; text-transform: uppercase; margin: 10px; cursor: pointer;
        }
        #reader a { color: var(--brand-yellow); text-decoration: none; }

        /* Manual Entry */
        .manual-entry { display: flex; gap: 10px; margin-top: 20px; background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .manual-entry input { 
            flex: 1; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); 
            color: var(--brand-yellow); border-radius: 4px; text-transform: uppercase; font-family: monospace; font-size: 1.1rem; font-weight: 700; width: 100%;
        }
        .manual-entry input:focus { outline: none; border-color: var(--brand-red); }
        .btn-verify { 
            padding: 12px 20px; background: rgba(230, 43, 43, 0.1); color: var(--brand-red); 
            border: 1px solid var(--brand-red); font-weight: 800; border-radius: 4px; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-verify:hover { background: var(--brand-red); color: #fff; }

        /* Full Screen Result Overlay */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 100;
            display: none; justify-content: center; align-items: center; padding: 15px;
            box-sizing: border-box; 
        }

        .result-card {
            width: 100%; max-width: 500px; background: var(--panel-bg); 
            border-radius: 12px; overflow: hidden; 
            border: 1px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            animation: slideUp 0.3s ease-out;
            display: flex; flex-direction: column; 
            max-height: 90vh; 
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .status-banner { padding: 20px; text-align: center; font-weight: 900; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px; }
        .status-success { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border-bottom: 2px solid #2ecc71; }
        .status-error { background: rgba(230, 43, 43, 0.15); color: var(--brand-red); border-bottom: 2px solid var(--brand-red); }
        .status-duplicate { background: rgba(252, 163, 17, 0.15); color: var(--brand-yellow); border-bottom: 2px solid var(--brand-yellow); }

        .dossier-content { 
            padding: 20px; 
            overflow-y: auto; 
        }
        .dossier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .data-point { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 6px; border-left: 3px solid #444; }
        .data-point.highlight { border-left-color: var(--brand-yellow); grid-column: span 2; }
        .data-point label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .data-point .value { font-size: 0.95rem; font-weight: 700; word-break: break-word; }

        .btn-reset {
            width: calc(100% - 40px); margin: 0 20px 20px 20px; padding: 15px; 
            background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); 
            font-weight: 800; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            flex-shrink: 0;
        }
        .btn-reset:hover { background: rgba(255,255,255,0.1); }

        @media (max-width: 400px) {
            .dossier-grid { grid-template-columns: 1fr; }
            .data-point.highlight { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="scanner-wrapper">
        <div class="header">
            <h1><i class="fa-solid fa-expand"></i> Gate Scanner</h1>
            <p>Access Control System</p>
        </div>
        
        <div id="reader"></div>

        <div class="manual-entry">
            <input type="text" id="manual-ticket" placeholder="ES26-XXXXX">
            <button class="btn-verify" onclick="processTicket(document.getElementById('manual-ticket').value)"><i class="fa-solid fa-bolt"></i></button>
        </div>
    </div>

    <!-- DATA OVERLAY -->
    <div id="result-overlay" class="result-overlay">
        <div class="result-card">
            <div id="status-banner" class="status-banner">
                <i class="fa-solid fa-circle-notch fa-spin"></i> VERIFYING...
            </div>
            
            <div class="dossier-content" id="dossier-content" style="display: none;">
                <!-- Injected via JS -->
            </div>

            <button class="btn-reset" onclick="resetScanner()">Scan Next Delegate</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('esummit_token');
        let isProcessing = false;

        // Ensure token exists before allowing scan
        if (!token) {
            alert("Scanner requires volunteer clearance. Redirecting to login.");
            window.location.href = "login.html"; // Ensure this points to your volunteer login route
        }

        async function processTicket(ticketId) {
            if (!ticketId || isProcessing) return;
            isProcessing = true;
            
            // Show Overlay
            const overlay = document.getElementById('result-overlay');
            const statusBanner = document.getElementById('status-banner');
            const dossierContent = document.getElementById('dossier-content');
            
            overlay.style.display = 'flex';
            statusBanner.className = 'status-banner';
            statusBanner.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> VERIFYING...';
            dossierContent.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/auth/check-in`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ ticketId: ticketId.toUpperCase() })
                });
                const data = await res.json();

                if (data.success) {
                    // Sounds
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});
                    
                    statusBanner.classList.add('status-success');
                    statusBanner.innerHTML = `<i class="fa-solid fa-check-circle"></i> ACCESS GRANTED`;
                    
                    renderDossier(data.data); // Calls rendering function
                } else {
                    // Sounds
                    new Audio('https://actions.google.com/sounds/v1/alarms/error_beep.ogg').play().catch(()=>{});
                    
                    if(data.error.includes("already checked in")) {
                        statusBanner.classList.add('status-duplicate');
                        statusBanner.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ALREADY CHECKED IN`;
                    } else {
                        statusBanner.classList.add('status-error');
                        statusBanner.innerHTML = `<i class="fa-solid fa-xmark-circle"></i> ACCESS DENIED`;
                    }
                    
                    // Display error message in body
                    dossierContent.style.display = 'block';
                    dossierContent.innerHTML = `<div style="text-align:center; padding: 20px; color: #888;">${data.error}</div>`;
                }
            } catch (err) {
                statusBanner.classList.add('status-error');
                statusBanner.innerHTML = `<i class="fa-solid fa-wifi"></i> NETWORK FAILURE`;
            }
        }

        function renderDossier(user) {
            if(!user) return;
            const container = document.getElementById('dossier-content');
            container.style.display = 'block';
            
            let specificHtml = '';
            if(user.delegateStatus === 'yes') {
                specificHtml = `
                    <div class="data-point"><label>Branch & Year</label> <div class="value">${user.branch || '--'} (${user.year || '--'})</div></div>
                    <div class="data-point"><label>Roll Number</label> <div class="value">${user.rollNo || '--'}</div></div>
                `;
            } else {
                specificHtml = `
                    <div class="data-point"><label>Location</label> <div class="value">${user.city || '--'}, ${user.state || '--'}</div></div>
                    <div class="data-point"><label>Gender</label> <div class="value">${user.gender || '--'}</div></div>
                `;
            }

            const hostelStatus = user.hostelAllocated ? `<span style="color:#2ecc71;">${user.allocatedHostelName}</span>` : (user.needHostel ? '<span style="color:#fca311;">Pending</span>' : 'None');

            container.innerHTML = `
                <div class="dossier-grid">
                    <div class="data-point highlight">
                        <label>Delegate Name</label> 
                        <div class="value" style="font-size: 1.3rem; color: var(--brand-yellow);">${user.fullName}</div>
                    </div>
                    
                    <div class="data-point"><label>Pass ID</label> <div class="value" style="color: var(--brand-red);">${user.ticketId}</div></div>
                    <div class="data-point"><label>Phone</label> <div class="value">${user.phoneNumber}</div></div>
                    
                    <div class="data-point highlight">
                        <label>Institution</label> 
                        <div class="value">${user.collegeName}</div>
                    </div>

                    ${specificHtml}

                    <div class="data-point"><label>Hostel Mapping</label> <div class="value">${hostelStatus}</div></div>
                    <div class="data-point"><label>Payment Status</label> <div class="value" style="color:#2ecc71;">${user.paymentStatus}</div></div>
                </div>
            `;
        }

        function resetScanner() {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('manual-ticket').value = '';
            isProcessing = false;
        }

        // Initialize Camera Scanner
        function onScanSuccess(decodedText, decodedResult) {
            if(!isProcessing) processTicket(decodedText);
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0,
            showTorchButtonIfSupported: true 
        }, false);
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
