<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Login | E-Summit</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-color: #050202;
            --brand-red: #e62b2b;
            --brand-yellow: #fca311;
            --text-white: #f5f5f5;
            --cyber-cyan: #00ffff;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color); color: var(--text-white);
            font-family: 'Montserrat', sans-serif; margin: 0; display: flex;
            justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden; position: relative;
        }

        /* --- 3D BACKGROUND --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; pointer-events: none; display: block; }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
            background-image:
                radial-gradient(circle at center, rgba(230, 43, 43, 0.08) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .back-icon-top {
            position: fixed; top: 30px; left: 30px; z-index: 100; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; color: rgba(255, 255, 255, 0.7); font-size: 1.2rem;
            text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-icon-top:hover { background: rgba(230, 43, 43, 0.1); color: var(--brand-red); border-color: var(--brand-red); transform: translateX(-5px); box-shadow: 0 0 15px rgba(230, 43, 43, 0.3); }

        /* --- SYSTEM HUD ACCENTS --- */
        .hud-corner {
            position: fixed; z-index: 5; font-family: monospace; font-size: 0.7rem; color: var(--brand-yellow);
            opacity: 0.55; text-shadow: 0 0 6px var(--brand-yellow); pointer-events: none; line-height: 1.6;
            letter-spacing: 0.5px;
        }
        .hud-tr { top: 30px; right: 30px; text-align: right; }
        .hud-bl { bottom: 30px; left: 30px; color: var(--brand-red); text-shadow: 0 0 6px var(--brand-red); }
        .hud-bl span.pulse { display: inline-block; width: 6px; height: 6px; background: #6be38a; border-radius: 50%; box-shadow: 0 0 8px #6be38a; margin-right: 6px; animation: blinkDot 1.6s infinite; }
        @keyframes blinkDot { 50% { opacity: 0.2; } }
        @media (max-width: 760px) { .hud-corner { display: none; } }

        /* --- AUTH CONTAINER --- */
        .auth-container {
            background: linear-gradient(145deg, rgba(12,3,3,0.92), rgba(3,1,1,0.98));
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 4px solid var(--brand-red);
            padding: 44px 40px; width: 100%; max-width: 450px; border-radius: 12px; margin: 40px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(230, 43, 43, 0.05);
            position: relative; z-index: 10; overflow: hidden;
            opacity: 0; transform: translateY(24px) scale(0.98);
            animation: containerEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.15s;
        }
        @keyframes containerEnter { to { opacity: 1; transform: translateY(0) scale(1); } }

        .auth-corner { position: absolute; width: 22px; height: 22px; pointer-events: none; opacity: 0.6; z-index: 2; }
        .auth-corner.tl { top: 0; left: 0; border-top: 2px solid var(--brand-yellow); border-left: 2px solid var(--brand-yellow); }
        .auth-corner.br { bottom: 0; right: 0; border-bottom: 2px solid var(--brand-yellow); border-right: 2px solid var(--brand-yellow); }

        .auth-eyebrow {
            text-align: center; font-size: 0.7rem; letter-spacing: 4px; color: #888; text-transform: uppercase;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .auth-eyebrow .dot { width: 5px; height: 5px; background: var(--brand-red); border-radius: 50%; box-shadow: 0 0 6px var(--brand-red); animation: blinkDot 1.8s infinite; }

        h2 {
            color: var(--brand-yellow); text-transform: uppercase; letter-spacing: 2px; text-align: center;
            margin-bottom: 28px; font-weight: 800; text-shadow: 0 0 10px rgba(252, 163, 17, 0.3);
            font-size: 1.5rem; transition: opacity 0.25s ease;
        }

        .form-group { margin-bottom: 20px; opacity: 0; transform: translateY(10px); animation: fieldEnter 0.5s ease forwards; }
        @keyframes fieldEnter { to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 1px;}
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"], select {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
            color: white; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.3s ease; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--brand-red); background: rgba(230, 43, 43, 0.06); box-shadow: 0 0 15px rgba(230, 43, 43, 0.25); }
        input:hover, select:hover { border-color: rgba(252, 163, 17, 0.3); }
        select option { background: var(--bg-color); color: white; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; color: #ccc; font-size: 0.9rem;}
        .checkbox-group input { cursor: pointer; width: 18px; height: 18px; accent-color: var(--brand-red);}

        #uiet-details {
            display: none; padding: 16px; margin-bottom: 20px; background: rgba(46, 204, 113, 0.04);
            border-left: 3px solid #2ecc71; border-radius: 0 6px 6px 0;
            animation: panelSlide 0.35s ease;
        }
        #external-college-details {
            display: none; padding: 16px; margin-bottom: 20px; background: rgba(230, 43, 43, 0.04);
            border-left: 3px solid var(--brand-red); border-radius: 0 6px 6px 0;
            animation: panelSlide 0.35s ease;
        }
        #hostel-options {
            display: none; margin-top: 15px; padding: 15px; border-radius: 6px;
            background: rgba(252, 163, 17, 0.05); border-left: 3px solid var(--brand-yellow);
            animation: panelSlide 0.35s ease;
        }
        @keyframes panelSlide { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

        .input-row { display: flex; gap: 15px; }
        .input-row .form-group { flex: 1; margin-bottom: 0;}

        .fee-terminal {
            background: #000; border: 1px solid rgba(252, 163, 17, 0.3); border-radius: 6px; padding: 16px;
            margin-top: 25px; font-family: monospace; font-size: 0.95rem; color: var(--brand-yellow);
            box-shadow: inset 0 0 10px rgba(252, 163, 17, 0.1); position: relative; overflow: hidden;
        }
        .fee-terminal::before {
            content: 'TXN.LOG'; position: absolute; top: 6px; right: 10px; font-size: 0.6rem; opacity: 0.4; letter-spacing: 2px;
        }
        .fee-row { display: flex; justify-content: space-between; margin-bottom: 8px; transition: color 0.3s ease; }
        .fee-total {
            display: flex; justify-content: space-between; border-top: 1px dashed rgba(252, 163, 17, 0.4);
            padding-top: 10px; margin-top: 5px; font-weight: bold; font-size: 1.15rem; color: var(--text-white);
        }
        #total-fee { transition: color 0.3s ease; }

        .btn-submit {
            width: 100%; padding: 16px; background: linear-gradient(45deg, var(--brand-red), #b31b1b); color: white;
            border: none; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; border-radius: 6px; margin-top: 25px; transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(230,43,43,0.3); position: relative; overflow: hidden;
        }
        .btn-submit::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
            transform: skewX(-20deg);
        }
        .btn-submit:hover::after { animation: shimmerSweep 1s ease; }
        @keyframes shimmerSweep { to { left: 150%; } }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(230,43,43,0.6); }
        .btn-submit:active { transform: translateY(0); }

        .toggle-text { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #888; }
        .toggle-text a { color: var(--brand-yellow); text-decoration: none; font-weight: 600; cursor: pointer; transition: color 0.3s;}
        .toggle-text a:hover { color: var(--text-white); }

        #api-message {
            display: none; padding: 16px 20px; margin-bottom: 25px;
            border-radius: 4px; font-weight: 600; font-size: 0.9rem;
            text-align: left; letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05); animation: slideDown 0.3s ease-out; align-items: center; gap: 15px;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-success { border-left: 4px solid #2ecc71; color: var(--text-white); }
        .msg-success i { color: #2ecc71; font-size: 1.2rem; }
        .msg-error { border-left: 4px solid var(--brand-red); color: var(--text-white); animation: shakeError 0.4s ease; }
        .msg-error i { color: var(--brand-red); font-size: 1.2rem; }
        @keyframes shakeError { 20%, 60% { transform: translateX(-4px); } 40%, 80% { transform: translateX(4px); } }

        #payment-section { display: none; text-align: center; animation: panelSlide 0.4s ease; }
        .qr-placeholder {
            width: 200px; height: 200px; background: white; margin: 0 auto 20px auto; border-radius: 8px; padding: 10px;
            position: relative; box-shadow: 0 0 30px rgba(252, 163, 17, 0.25);
        }
        .qr-placeholder img { width: 100%; height: 100%; object-fit: contain; }
        .qr-placeholder::before {
            content: ''; position: absolute; inset: -2px; border-radius: 10px;
            background: linear-gradient(135deg, var(--brand-red), var(--brand-yellow));
            z-index: -1; opacity: 0.5; filter: blur(6px);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
        }

        @media (max-width: 480px) {
            .auth-container { padding: 32px 22px; margin: 20px 14px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <a href="index.html" class="back-icon-top" title="Return Home"><i class="fa-solid fa-arrow-left"></i></a>

    <div class="hud-corner hud-tr">SYS.AUTH // ONLINE<br>NODE: KUK-ESUMMIT-01</div>
    <div class="hud-corner hud-bl"><span class="pulse"></span>SECURE CHANNEL ESTABLISHED</div>

    <div class="auth-container">
        <div class="auth-corner tl"></div>
        <div class="auth-corner br"></div>

        <p class="auth-eyebrow"><span class="dot"></span>Delegate Access Portal</p>
        <h2 id="form-title">Initialize Profile</h2>

        <div id="api-message"></div>

        <form id="auth-form">
            <div class="form-group reg-only" style="animation-delay: 0.05s;">
                <label>Full Name</label>
                <input type="text" id="inp-name" placeholder="Enter your name">
            </div>
            <div class="form-group reg-only" style="animation-delay: 0.1s;">
                <label>Phone Number</label>
                <input type="tel" id="inp-phone" placeholder="10 Digit Number" pattern="[0-9]{10}">
            </div>
            <div class="form-group" style="animation-delay: 0.15s;">
                <label>Email ID</label>
                <input type="email" id="inp-email" placeholder="agent@domain.com" required>
            </div>
            <div class="form-group" style="animation-delay: 0.2s;">
                <label>Password</label>
                <input type="password" id="inp-password" placeholder="••••••••" required>
            </div>

            <div class="reg-only">
                <div class="form-group" style="animation-delay: 0.25s;">
                    <label>Delegate Status</label>
                    <select id="uiet-status" onchange="updateFormLogic()">
                        <option value="yes">UIET KUK STUDENT</option>
                        <option value="no">OTHER COLLEGE</option>
                    </select>
                </div>

                <div id="uiet-details">
                    <div class="form-group" style="animation-delay: 0s;">
                        <label>Branch</label>
                        <select id="uiet-branch">
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="ME">ME</option>
                            <option value="BT">BT</option>
                            <option value="ECo">ECO</option>
                            <option value="AIML">AIML</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <div class="form-group" style="animation-delay: 0s;">
                            <label>Year</label>
                            <select id="uiet-year">
                                <option value="1st">1st Year</option><option value="2nd">2nd Year</option>
                                <option value="3rd">3rd Year</option><option value="4th">4th Year</option>
                            </select>
                        </div>
                        <div class="form-group" style="animation-delay: 0s;"><label>Roll Number</label><input type="text" id="uiet-roll" placeholder="University Roll No"></div>
                    </div>
                </div>

                <div id="external-college-details">
                    <div class="form-group" style="animation-delay: 0s;">
                        <label>College/University Name</label>
                        <input type="text" id="ext-college" placeholder="Enter institution name">
                    </div>
                    <div class="input-row">
                        <div class="form-group" style="animation-delay: 0s;"><label>City</label><input type="text" id="ext-city" placeholder="City"></div>
                        <div class="form-group" style="animation-delay: 0s;"><label>State</label><input type="text" id="ext-state" placeholder="State"></div>
                    </div>
                    <div class="form-group" style="margin-top: 15px; animation-delay: 0s;">
                        <label>Gender</label>
                        <select id="ext-gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div id="hostel-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="need-hostel" onchange="updateFormLogic()"> Request Hostel
                    </label>
                </div>

                <div class="fee-terminal" id="fee-summary" style="opacity: 0; animation: fieldEnter 0.5s ease forwards; animation-delay: 0.3s;">
                    <div class="fee-row"><span>&gt; Registration Fee:</span><span id="reg-fee">₹0</span></div>
                    <div class="fee-row"><span>&gt; Hostel Fee:</span><span id="acc-fee">₹0</span></div>
                    <div class="fee-total"><span>&gt; TOTAL PAYABLE:</span><span id="total-fee">₹0</span></div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Register</button>
        </form>

        <p class="toggle-text" id="toggle-hint">Already have access? <a onclick="toggleForm()">Login here</a></p>

        <div id="payment-section">
            <p style="color: #bbb; margin-bottom: 20px;">Scan the QR code to pay <strong id="pay-amount" style="color: var(--brand-yellow); font-size:1.2rem;"></strong> via UPI.</p>

            <div class="qr-placeholder">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg" alt="UPI QR">
            </div>

            <form id="payment-form">
                <div class="form-group" style="animation-delay: 0s;">
                    <label style="text-align: left;">12-Digit UPI UTR Number</label>
                    <input type="text" id="inp-utr" placeholder="e.g. 312345678901" pattern="[0-9]{12}" required>
                </div>
                <button type="submit" class="btn-submit" style="background: linear-gradient(45deg, #2ecc71, #27ae60);">Submit UTR</button>
            </form>
        </div>

    </div>

    <script>
        const API_URL = "https://esummit-backend-gonf.onrender.com/api";
        let isLogin = false;
        let expectedFee = 0;

        function showMessage(msg, isSuccess) {
            const msgBox = document.getElementById('api-message');
            const icon = isSuccess ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
            msgBox.innerHTML = `${icon} <span>${msg}</span>`;
            msgBox.className = isSuccess ? 'msg-success' : 'msg-error';
            msgBox.style.display = 'flex';
            document.querySelector('.auth-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateFormLogic() {
            if(isLogin) return;
            const status = document.getElementById('uiet-status').value;
            const extCollegeBox = document.getElementById('external-college-details');
            const uietBox = document.getElementById('uiet-details');
            const hostelBox = document.getElementById('hostel-options');
            const needsHostel = document.getElementById('need-hostel').checked;

            let regFee = 0, accFee = 0;

            if(status === 'no') {
                extCollegeBox.style.display = 'block';
                hostelBox.style.display = 'block';
                uietBox.style.display = 'none';
                regFee = 300;
                if (needsHostel) accFee = 700;
            } else {
                extCollegeBox.style.display = 'none';
                hostelBox.style.display = 'none';
                uietBox.style.display = 'block';
                document.getElementById('need-hostel').checked = false;
            }

            expectedFee = regFee + accFee;
            document.getElementById('reg-fee').innerText = `₹${regFee}`;
            document.getElementById('acc-fee').innerText = `₹${accFee}`;
            document.getElementById('total-fee').innerText = `₹${expectedFee}`;
        }

        function toggleForm() {
            isLogin = !isLogin;
            const title = document.getElementById('form-title');
            const regOnlyElements = document.querySelectorAll('.reg-only');
            const btn = document.getElementById('submit-btn');
            const toggleHint = document.getElementById('toggle-hint');
            document.getElementById('api-message').style.display = 'none';

            if(isLogin) {
                title.innerText = "Login";
                regOnlyElements.forEach(el => el.style.display = 'none');
                btn.innerText = "Login";
                toggleHint.innerHTML = 'Need clearance? <a onclick="toggleForm()">Register here</a>';

                document.getElementById('inp-name').removeAttribute('required');
                document.getElementById('inp-phone').removeAttribute('required');
            } else {
                title.innerText = "Initialize Profile";
                regOnlyElements.forEach(el => el.style.display = 'block');
                btn.innerText = "Register";
                toggleHint.innerHTML = 'Already have access? <a onclick="toggleForm()">Login here</a>';

                document.getElementById('inp-name').setAttribute('required', 'true');
                document.getElementById('inp-phone').setAttribute('required', 'true');
                updateFormLogic();
            }
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('inp-email').value;
            const password = document.getElementById('inp-password').value;

            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerText;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            submitBtn.style.opacity = '0.7';
            submitBtn.style.cursor = 'not-allowed';

            try {
                if (isLogin) {
                    const res = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();

                    if(data.success) {
                        localStorage.setItem('esummit_token', data.token);
                        showMessage("Successful, Redirecting...", true);
                        setTimeout(() => window.location.href = "dashboard.html", 1500);
                    } else {
                        showMessage(data.error || "Login Failed", false);
                    }
                } else {
                    const payload = {
                        fullName: document.getElementById('inp-name').value,
                        phoneNumber: document.getElementById('inp-phone').value,
                        email: email,
                        password: password,
                        delegateStatus: document.getElementById('uiet-status').value,
                        collegeName: document.getElementById('uiet-status').value === 'no' ? document.getElementById('ext-college').value : 'UIET KUK',
                        city: document.getElementById('ext-city').value || 'Kurukshetra',
                        state: document.getElementById('ext-state').value || 'Haryana',
                        needHostel: document.getElementById('need-hostel').checked,
                        gender: document.getElementById('uiet-status').value === 'no' ? document.getElementById('ext-gender').value : undefined,
                        branch: document.getElementById('uiet-branch').value,
                        year: document.getElementById('uiet-year').value,
                        rollNo: document.getElementById('uiet-roll').value
                    };

                    const res = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if(data.success) {
                        const loginRes = await fetch(`${API_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        const loginData = await loginRes.json();
                        localStorage.setItem('esummit_token', loginData.token);

                        if(expectedFee > 0) {
                            document.getElementById('auth-form').style.display = 'none';
                            document.getElementById('toggle-hint').style.display = 'none';
                            document.getElementById('form-title').innerText = "Payment Required";
                            document.getElementById('payment-section').style.display = 'block';
                            document.getElementById('pay-amount').innerText = `₹${expectedFee}`;
                            showMessage("Profile created! Please complete payment.", true);
                        } else {
                            showMessage("UIET Clearance Granted! Redirecting...", true);
                            setTimeout(() => window.location.href = "dashboard.html", 1500);
                        }
                    } else {
                        showMessage(data.error || "Registration Failed", false);
                    }
                }
            } catch (err) {
                showMessage("Server connection failed.", false);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
            }
        });

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const utrNumber = document.getElementById('inp-utr').value;
            const token = localStorage.getItem('esummit_token');

            try {
                const res = await fetch(`${API_URL}/payments/submit-utr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ utrNumber })
                });
                const data = await res.json();

                if(data.success) {
                    showMessage(data.message, true);
                    document.getElementById('payment-form').innerHTML = "<p style='color:#2ecc71; font-weight:bold; margin-top:10px;'><i class='fa-solid fa-circle-check'></i> UTR Submitted Successfully.</p>";
                    setTimeout(() => window.location.href = "dashboard.html", 2500);
                } else {
                    showMessage(data.error || "Failed to submit UTR", false);
                }
            } catch (err) {
                showMessage("Server connection failed.", false);
            }
        });

        updateFormLogic();

        /* ================= IMMERSIVE 3D BACKGROUND (visual only) ================= */
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050202, 0.0028);

        const isMobile = window.innerWidth <= 768;
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 60);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));

        const glowMat = new THREE.PointsMaterial({ size: 0.42, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false });

        // Starfield
        const starCount = isMobile ? 3500 : 9000;
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(starCount * 3);
        const starsCol = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starsPos[i*3] = (Math.random() - 0.5) * 1000;
            starsPos[i*3+1] = (Math.random() - 0.5) * 1000;
            starsPos[i*3+2] = 60 - (Math.random() * 1200);
            const b = 0.4 + Math.random() * 0.6;
            starsCol[i*3] = b; starsCol[i*3+1] = b; starsCol[i*3+2] = b;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        starsGeo.setAttribute('color', new THREE.BufferAttribute(starsCol, 3));
        const stars = new THREE.Points(starsGeo, glowMat);
        scene.add(stars);

        // Wireframe sentinel planets, kept off to the sides so the form stays readable
        const planetGeo = new THREE.IcosahedronGeometry(isMobile ? 26 : 42, 2);
        const planetMatRed = new THREE.MeshBasicMaterial({ color: 0xe62b2b, wireframe: true, transparent: true, opacity: 0.16 });
        const planetMatYellow = new THREE.MeshBasicMaterial({ color: 0xfca311, wireframe: true, transparent: true, opacity: 0.13 });

        const planetLeft = new THREE.Mesh(planetGeo, planetMatRed);
        planetLeft.position.set(isMobile ? -55 : -110, 20, -160);
        scene.add(planetLeft);

        const planetRight = new THREE.Mesh(planetGeo, planetMatYellow);
        planetRight.position.set(isMobile ? 55 : 120, -25, -220);
        scene.add(planetRight);

        // Slow-drifting data shards (small dodecahedrons) for ambient depth
        const shardGeo = new THREE.DodecahedronGeometry(1.6, 0);
        const shardSolid = new THREE.MeshBasicMaterial({ color: 0x220505 });
        const shardWire = new THREE.MeshBasicMaterial({ color: 0xe62b2b, wireframe: true, transparent: true, opacity: 0.35 });
        const shards = [];
        const shardCount = isMobile ? 18 : 50;
        for (let i = 0; i < shardCount; i++) {
            const group = new THREE.Group();
            const solid = new THREE.Mesh(shardGeo, shardSolid);
            const wire = new THREE.Mesh(shardGeo, shardWire);
            wire.scale.set(1.05, 1.05, 1.05);
            group.add(solid); group.add(wire);
            group.position.set((Math.random() - 0.5) * 220, (Math.random() - 0.5) * 160, 60 - Math.random() * 500);
            const s = 0.6 + Math.random() * 1.6;
            group.scale.set(s, s, s);
            group.userData = { rx: (Math.random() - 0.5) * 0.015, ry: (Math.random() - 0.5) * 0.015, drift: 0.02 + Math.random() * 0.03 };
            shards.push(group);
            scene.add(group);
        }

        // Central data-ring behind the form for visual anchoring
        const ringGroup = new THREE.Group();
        ringGroup.position.set(0, 0, -40);
        const ringGeo = new THREE.BufferGeometry();
        const ringCount = isMobile ? 700 : 1800;
        const ringPos = new Float32Array(ringCount * 3);
        const ringCol = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 70 + Math.random() * 18;
            ringPos[i*3] = Math.cos(angle) * radius;
            ringPos[i*3+1] = Math.sin(angle) * radius * 0.4;
            ringPos[i*3+2] = (Math.random() - 0.5) * 8;
            const c = Math.random() > 0.5 ? new THREE.Color(0xe62b2b) : new THREE.Color(0xfca311);
            ringCol[i*3] = c.r; ringCol[i*3+1] = c.g; ringCol[i*3+2] = c.b;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(ringCol, 3));
        const ring = new THREE.Points(ringGeo, glowMat);
        ringGroup.add(ring);
        ringGroup.rotation.x = 0.3;
        scene.add(ringGroup);

        function animateBG() {
            requestAnimationFrame(animateBG);
            planetLeft.rotation.y += 0.0009;
            planetLeft.rotation.x += 0.0003;
            planetRight.rotation.y -= 0.0007;
            ringGroup.rotation.z += 0.0012;
            shards.forEach(s => {
                s.rotation.x += s.userData.rx;
                s.rotation.y += s.userData.ry;
                s.position.z += s.userData.drift;
                if (s.position.z > 80) s.position.z = -500;
            });
            renderer.render(scene, camera);
        }
        animateBG();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
