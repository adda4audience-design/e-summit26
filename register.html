<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Terminal | Register</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #050202; --brand-red: #e62b2b; 
            --brand-yellow: #fca311; --text-white: #f5f5f5; 
        }
        
        body { 
            background-color: var(--bg-color); color: var(--text-white); 
            font-family: 'Montserrat', sans-serif; margin: 0; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at center, rgba(230, 43, 43, 0.1) 0%, transparent 60%), linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        
        .back-icon-top {
            position: fixed; top: 30px; left: 30px; z-index: 100; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; color: rgba(255, 255, 255, 0.7); font-size: 1.2rem;
            text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-icon-top:hover { background: rgba(230, 43, 43, 0.1); color: var(--brand-red); border-color: var(--brand-red); transform: translateX(-5px); box-shadow: 0 0 15px rgba(230, 43, 43, 0.3); }

        .auth-container {
            background: linear-gradient(145deg, rgba(12,3,3,0.9), rgba(3,1,1,0.98)); 
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 4px solid var(--brand-red);
            padding: 40px; width: 100%; max-width: 450px; border-radius: 12px; margin: 40px 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(230, 43, 43, 0.05);
        }

        h2 { color: var(--brand-yellow); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 30px; font-weight: 800; text-shadow: 0 0 10px rgba(252, 163, 17, 0.3); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 1px;}
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"], select {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
            color: white; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.3s ease; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--brand-red); background: rgba(230, 43, 43, 0.05); box-shadow: 0 0 15px rgba(230, 43, 43, 0.2); }
        select option { background: var(--bg-color); color: white; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; color: #ccc; font-size: 0.9rem;}
        .checkbox-group input { cursor: pointer; width: 18px; height: 18px; accent-color: var(--brand-red);}
        
        #uiet-details { display: none; padding: 15px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.02); border-left: 3px solid #2ecc71; border-radius: 0 6px 6px 0; }
        #external-college-details { display: none; padding: 15px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.02); border-left: 3px solid var(--brand-red); border-radius: 0 6px 6px 0; }
        #hostel-options { display: none; margin-top: 15px; padding: 15px; border-radius: 6px; background: rgba(252, 163, 17, 0.05); border-left: 3px solid var(--brand-yellow); }
        .input-row { display: flex; gap: 15px; } .input-row .form-group { flex: 1; margin-bottom: 0;}

        .fee-terminal { background: #000; border: 1px solid rgba(252, 163, 17, 0.3); border-radius: 6px; padding: 15px; margin-top: 25px; font-family: monospace; font-size: 0.95rem; color: var(--brand-yellow); box-shadow: inset 0 0 10px rgba(252, 163, 17, 0.1); }
        .fee-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .fee-total { display: flex; justify-content: space-between; border-top: 1px dashed rgba(252, 163, 17, 0.4); padding-top: 10px; margin-top: 5px; font-weight: bold; font-size: 1.1rem; color: var(--text-white); }

        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--brand-red), #b31b1b); color: white; border: none; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 6px; margin-top: 25px; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(230,43,43,0.3); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(230,43,43,0.6); }

        .toggle-text { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #888; }
        .toggle-text a { color: var(--brand-yellow); text-decoration: none; font-weight: 600; cursor: pointer; transition: color 0.3s;}
        .toggle-text a:hover { color: var(--text-white); }

        #api-message { 
            display: none; padding: 16px 20px; margin-bottom: 25px; 
            border-radius: 4px; font-weight: 600; font-size: 0.9rem; 
            text-align: left; letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05); animation: slideDown 0.3s ease-out; align-items: center; gap: 15px;
        }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-success { border-left: 4px solid #2ecc71; color: var(--text-white); }
        .msg-success i { color: #2ecc71; font-size: 1.2rem; }
        .msg-error { border-left: 4px solid var(--brand-red); color: var(--text-white); }
        .msg-error i { color: var(--brand-red); font-size: 1.2rem; }

        #payment-section { display: none; text-align: center;}
        .qr-placeholder { width: 200px; height: 200px; background: white; margin: 0 auto 20px auto; border-radius: 8px; padding: 10px; }
        .qr-placeholder img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <a href="index.html" class="back-icon-top" title="Return Home"><i class="fa-solid fa-arrow-left"></i></a>

    <div class="auth-container">
        <h2 id="form-title">Initialize Profile</h2>
        
        <div id="api-message"></div>

        <form id="auth-form">
            <div class="form-group reg-only">
                <label>Full Name</label>
                <input type="text" id="inp-name" placeholder="Enter your name">
            </div>
            <div class="form-group reg-only">
                <label>Phone Number</label>
                <input type="tel" id="inp-phone" placeholder="10 Digit Number" pattern="[0-9]{10}">
            </div>
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="inp-email" placeholder="agent@domain.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="inp-password" placeholder="••••••••" required>
            </div>

            <div class="reg-only">
                <div class="form-group">
                    <label>Delegate Status</label>
                    <select id="uiet-status" onchange="updateFormLogic()">
                        <option value="yes">UIET KUK STUDENT</option>
                        <option value="no">OTHER COLLEGE</option>
                    </select>
                </div>

                <div id="uiet-details">
                    <div class="form-group">
                        <label>Branch</label>
                        <select id="uiet-branch">
                            <option value="CSE">Computer Science (CSE)</option>
                            <option value="AIML">AI & Machine Learning (AI ML)</option>
                            <option value="ECE">Electronics (ECE)</option>
                            <option value="ECE">Electronics & Computer (EC0)</option>
                            <option value="ME">Mechanical (ME)</option>
                            <option value="BT">Bio-Tech (BT)</option>
                            <option value="CE">Civil (CE)</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <div class="form-group">
                            <label>Year</label>
                            <select id="uiet-year">
                                <option value="1st">1st Year</option><option value="2nd">2nd Year</option>
                                <option value="3rd">3rd Year</option><option value="4th">4th Year</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Roll Number</label><input type="text" id="uiet-roll" placeholder="University Roll No"></div>
                    </div>
                </div>

                <div id="external-college-details">
                    <div class="form-group">
                        <label>College/University Name</label>
                        <input type="text" id="ext-college" placeholder="Enter institution name">
                    </div>
                    <div class="input-row">
                        <div class="form-group"><label>City</label><input type="text" id="ext-city" placeholder="City"></div>
                        <div class="form-group"><label>State</label><input type="text" id="ext-state" placeholder="State"></div>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Gender</label>
                        <select id="ext-gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div id="hostel-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="need-hostel" onchange="updateFormLogic()"> Request Hostel
                    </label>
                </div>

                <div class="fee-terminal" id="fee-summary">
                    <div class="fee-row"><span>> Registration Fee:</span><span id="reg-fee">₹0</span></div>
                    <div class="fee-row"><span>> Hostel Fee:</span><span id="acc-fee">₹0</span></div>
                    <div class="fee-total"><span>> TOTAL PAYABLE:</span><span id="total-fee">₹0</span></div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Register</button>
        </form>

        <p class="toggle-text" id="toggle-hint">Already have access? <a onclick="toggleForm()">Login here</a></p>

        <div id="payment-section">
            <p style="color: #bbb; margin-bottom: 20px;">Scan the QR code to pay <strong id="pay-amount" style="color: var(--brand-yellow); font-size:1.2rem;"></strong> via UPI.</p>
            
            <div class="qr-placeholder">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg" alt="UPI QR">
            </div>

            <form id="payment-form">
                <div class="form-group">
                    <label style="text-align: left;">12-Digit UPI UTR Number</label>
                    <input type="text" id="inp-utr" placeholder="e.g. 312345678901" pattern="[0-9]{12}" required>
                </div>
                <button type="submit" class="btn-submit" style="background: linear-gradient(45deg, #2ecc71, #27ae60);">Submit UTR</button>
            </form>
        </div>

    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        let isLogin = false;
        let expectedFee = 0;

        function showMessage(msg, isSuccess) {
            const msgBox = document.getElementById('api-message');
            const icon = isSuccess ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
            msgBox.innerHTML = `${icon} <span>${msg}</span>`;
            msgBox.className = isSuccess ? 'msg-success' : 'msg-error';
            msgBox.style.display = 'flex';
            document.querySelector('.auth-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateFormLogic() {
            if(isLogin) return;
            const status = document.getElementById('uiet-status').value;
            const extCollegeBox = document.getElementById('external-college-details');
            const uietBox = document.getElementById('uiet-details');
            const hostelBox = document.getElementById('hostel-options');
            const needsHostel = document.getElementById('need-hostel').checked;
            
            let regFee = 0, accFee = 0;

            if(status === 'no') {
                extCollegeBox.style.display = 'block';
                hostelBox.style.display = 'block';
                uietBox.style.display = 'none';
                regFee = 300;
                if (needsHostel) accFee = 700;
            } else {
                extCollegeBox.style.display = 'none';
                hostelBox.style.display = 'none';
                uietBox.style.display = 'block';
                document.getElementById('need-hostel').checked = false; 
            }

            expectedFee = regFee + accFee;
            document.getElementById('reg-fee').innerText = `₹${regFee}`;
            document.getElementById('acc-fee').innerText = `₹${accFee}`;
            document.getElementById('total-fee').innerText = `₹${expectedFee}`;
        }

        function toggleForm() {
            isLogin = !isLogin;
            const title = document.getElementById('form-title');
            const regOnlyElements = document.querySelectorAll('.reg-only');
            const btn = document.getElementById('submit-btn');
            const toggleHint = document.getElementById('toggle-hint');
            document.getElementById('api-message').style.display = 'none';

            if(isLogin) {
                title.innerText = "Access Terminal";
                regOnlyElements.forEach(el => el.style.display = 'none');
                btn.innerText = "Login";
                toggleHint.innerHTML = 'Need clearance? <a onclick="toggleForm()">Register here</a>';
                
                document.getElementById('inp-name').removeAttribute('required');
                document.getElementById('inp-phone').removeAttribute('required');
            } else {
                title.innerText = "Initialize Profile";
                regOnlyElements.forEach(el => el.style.display = 'block');
                btn.innerText = "Register";
                toggleHint.innerHTML = 'Already have access? <a onclick="toggleForm()">Login here</a>';
                
                document.getElementById('inp-name').setAttribute('required', 'true');
                document.getElementById('inp-phone').setAttribute('required', 'true');
                updateFormLogic();
            }
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('inp-email').value;
            const password = document.getElementById('inp-password').value;

            try {
                if (isLogin) {
                    const res = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    
                    if(data.success) {
                        localStorage.setItem('esummit_token', data.token);
                        showMessage("Access Granted. Redirecting...", true);
                        setTimeout(() => window.location.href = "dashboard.html", 1500); 
                    } else {
                        showMessage(data.error || "Login Failed", false);
                    }
                } else {
                    const payload = {
                        fullName: document.getElementById('inp-name').value,
                        phoneNumber: document.getElementById('inp-phone').value,
                        email: email,
                        password: password,
                        delegateStatus: document.getElementById('uiet-status').value,
                        collegeName: document.getElementById('uiet-status').value === 'no' ? document.getElementById('ext-college').value : 'UIET KUK',
                        city: document.getElementById('ext-city').value || 'Kurukshetra',
                        state: document.getElementById('ext-state').value || 'Haryana',
                        needHostel: document.getElementById('need-hostel').checked,
                        gender: document.getElementById('uiet-status').value === 'no' ? document.getElementById('ext-gender').value : undefined,
                        branch: document.getElementById('uiet-branch').value,
                        year: document.getElementById('uiet-year').value,
                        rollNo: document.getElementById('uiet-roll').value
                    };

                    const res = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if(data.success) {
                        const loginRes = await fetch(`${API_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        const loginData = await loginRes.json();
                        localStorage.setItem('esummit_token', loginData.token);

                        if(expectedFee > 0) {
                            document.getElementById('auth-form').style.display = 'none';
                            document.getElementById('toggle-hint').style.display = 'none';
                            document.getElementById('form-title').innerText = "Payment Required";
                            document.getElementById('payment-section').style.display = 'block';
                            document.getElementById('pay-amount').innerText = `₹${expectedFee}`;
                            showMessage("Profile created! Please complete payment.", true);
                        } else {
                            showMessage("UIET Clearance Granted! Redirecting...", true);
                            setTimeout(() => window.location.href = "dashboard.html", 1500);
                        }
                    } else {
                        showMessage(data.error || "Registration Failed", false);
                    }
                }
            } catch (err) {
                showMessage("Server connection failed.", false);
            }
        });

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const utrNumber = document.getElementById('inp-utr').value;
            const token = localStorage.getItem('esummit_token');

            try {
                const res = await fetch(`${API_URL}/payments/submit-utr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ utrNumber })
                });
                const data = await res.json();

                if(data.success) {
                    showMessage(data.message, true);
                    document.getElementById('payment-form').innerHTML = "<p style='color:#2ecc71; font-weight:bold; margin-top:10px;'><i class='fa-solid fa-circle-check'></i> UTR Submitted Successfully.</p>";
                    setTimeout(() => window.location.href = "dashboard.html", 2500);
                } else {
                    showMessage(data.error || "Failed to submit UTR", false);
                }
            } catch (err) {
                showMessage("Server connection failed.", false);
            }
        });

        updateFormLogic();
    </script>
</body>
</html>
