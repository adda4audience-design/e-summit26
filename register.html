<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Terminal | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #030101; --brand-red: #e62b2b; --brand-yellow: #fca311; --text-white: #f5f5f5; }
        body { 
            background-color: var(--bg-color); color: var(--text-white); font-family: 'Montserrat', sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0505 0%, #030101 100%);
        }
        
        .auth-container {
            background: rgba(8, 2, 2, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(230, 43, 43, 0.3); border-top: 4px solid var(--brand-red);
            padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        h2 { color: var(--brand-yellow); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 30px;}
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-family: 'Montserrat', sans-serif; border-radius: 4px; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--brand-red); background: rgba(255,255,255,0.1); }
        
        select option { background: var(--bg-color); color: white; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer;}
        .checkbox-group input { cursor: pointer; width: 18px; height: 18px; accent-color: var(--brand-red);}
        
        /* Hidden by default */
        #hostel-options { display: none; margin-top: 15px; padding: 15px; background: rgba(252, 163, 17, 0.1); border-left: 3px solid var(--brand-yellow); }

        .btn-submit {
            width: 100%; padding: 15px; background: var(--brand-red); color: white; border: none;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            border-radius: 4px; margin-top: 20px; transition: 0.3s;
        }
        .btn-submit:hover { box-shadow: 0 0 20px rgba(230,43,43,0.5); }

        .toggle-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888; }
        .toggle-text a { color: var(--brand-yellow); text-decoration: none; font-weight: 600; cursor: pointer;}
        
        .back-home { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;}
        .back-home:hover { color: white; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="form-title">Initialize Profile</h2>
        
        <form id="auth-form">
            <div class="form-group" id="name-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" placeholder="example@domain.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div id="register-fields">
                <div class="form-group">
                    <label>Are you a current student of UIET KUK?</label>
                    <select id="uiet-status" onchange="checkHostelEligibility()">
                        <option value="yes">Yes, I am from UIET</option>
                        <option value="no">No, I am from outside</option>
                    </select>
                </div>

                <div id="hostel-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="need-hostel">
                        Request Hostel Accommodation (Optional)
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Register</button>
        </form>

        <p class="toggle-text" id="toggle-hint">Already have access? <a onclick="toggleForm()">Login here</a></p>
        <a href="index.html" class="back-home">Abort & Return Home</a>
    </div>

    <script>
        let isLogin = false;

        function checkHostelEligibility() {
            const status = document.getElementById('uiet-status').value;
            const hostelBox = document.getElementById('hostel-options');
            
            if(status === 'no') {
                hostelBox.style.display = 'block';
            } else {
                hostelBox.style.display = 'none';
                document.getElementById('need-hostel').checked = false; // reset
            }
        }

        function toggleForm() {
            isLogin = !isLogin;
            const title = document.getElementById('form-title');
            const nameGroup = document.getElementById('name-group');
            const regFields = document.getElementById('register-fields');
            const btn = document.getElementById('submit-btn');
            const toggleHint = document.getElementById('toggle-hint');

            if(isLogin) {
                title.innerText = "Access Terminal";
                nameGroup.style.display = 'none';
                regFields.style.display = 'none';
                btn.innerText = "Login";
                toggleHint.innerHTML = 'Need clearance? <a onclick="toggleForm()">Register here</a>';
            } else {
                title.innerText = "Initialize Profile";
                nameGroup.style.display = 'block';
                regFields.style.display = 'block';
                btn.innerText = "Register";
                toggleHint.innerHTML = 'Already have access? <a onclick="toggleForm()">Login here</a>';
            }
        }
    </script>
</body>
</html>
