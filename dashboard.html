<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard | E-Summit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Generation and Vector Scanning Implementations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg-color: #030101; --brand-red: #e62b2b; --brand-yellow: #fca311; --text-white: #f5f5f5; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-white); 
            font-family: 'Montserrat', sans-serif; margin: 0; padding: 40px 5%;
            background-image: radial-gradient(circle at 15% 20%, rgba(230, 43, 43, 0.08), transparent 40%), radial-gradient(circle at 85% 80%, rgba(252, 163, 17, 0.08), transparent 40%);
            min-height: 100vh; display: flex; justify-content: center;
        }

        .dashboard-wrapper { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 400px; gap: 40px; position: relative; z-index: 1; }

        .glass-panel {
            background: linear-gradient(145deg, rgba(12,3,3,0.8), rgba(3,1,1,0.95));
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 30px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: var(--brand-yellow); text-transform: uppercase; margin: 0; font-size: 1.6rem; letter-spacing: 2px;}
        
        .btn-action { background: transparent; color: var(--brand-yellow); border: 1px solid var(--brand-yellow); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 800; text-transform: uppercase; transition: all 0.3s; margin-left: 10px;}
        
        .btn-edit { background: var(--brand-yellow); color: #120000; border-color: var(--brand-yellow); }
        .btn-edit:hover { background: transparent; color: var(--brand-yellow); box-shadow: 0 0 15px rgba(252,163,17,0.4); }

        .btn-logout { background: var(--brand-red); color: #fff; border-color: var(--brand-red); }
        .btn-logout:hover { background: transparent; color: var(--brand-red); box-shadow: 0 0 15px rgba(230,43,43,0.4); }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .data-group { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 6px; border-left: 2px solid #444; }
        .data-group.highlight { border-left-color: var(--brand-yellow); background: rgba(252, 163, 17, 0.05); }
        .data-group label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;}
        .data-group label i { margin-right: 5px; color: var(--brand-yellow); }
        .data-group .value { font-size: 1.1rem; font-weight: 600; word-break: break-all; }

        .ticket-wrapper { border-top: 4px solid var(--brand-red); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        .btn-download { background: linear-gradient(45deg, var(--brand-red), var(--brand-yellow)); color: #000; border: none; padding: 15px 30px; border-radius: 4px; font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; width: 100%; transition: transform 0.3s, box-shadow 0.3s; }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(230, 43, 43, 0.4); }

        .lock-screen { text-align: center; color: #888; padding: 40px 20px; }
        .lock-screen i { font-size: 3rem; color: var(--brand-red); margin-bottom: 15px; }

        .utr-form { background: rgba(252, 163, 17, 0.05); padding: 20px; border-radius: 8px; border: 1px solid rgba(252, 163, 17, 0.3); margin-top: 20px; text-align: center;}
        .utr-form input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px; font-family: monospace; font-size: 1.1rem; text-align: center; margin-bottom: 15px; box-sizing: border-box;}
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #0a0202; border: 1px solid var(--brand-yellow); padding: 30px; border-radius: 8px; width: 90%; max-width: 500px; }
        .modal-content h2 { margin-top: 0; color: var(--brand-yellow); text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px; box-sizing: border-box;}

        /* --- TICKET MODAL STYLES --- */
        .ticket-modal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); padding: 20px; box-sizing: border-box;}
        .ticket-modal-container.active { display: flex; }
        .close-ticket-btn { position: absolute; top: 30px; right: 40px; color: white; font-size: 2.5rem; cursor: pointer; transition: color 0.3s; z-index: 2001;}
        .close-ticket-btn:hover { color: var(--brand-red); }
        
        .golden-gradient {
            background: linear-gradient(90deg, #fca311, #ffdd44, #fca311);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .id-box-overlay {
            position: absolute;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.9rem, 2.2vw, 1.8rem);
            letter-spacing: 3px;
        }

/* --- PREMIUM MOBILE DASHBOARD --- */
        @media (max-width: 768px) {
            body { padding: 70px 15px 30px 15px; align-items: flex-start; }
            .home-btn { top: 15px !important; left: 15px !important; font-size: 1.2rem !important; padding: 8px 12px !important; }
            
            .dashboard-wrapper { gap: 20px; grid-template-columns: 1fr; }
            .glass-panel { padding: 20px 15px; }
            
            .header { flex-direction: column; align-items: flex-start; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .header h1 { font-size: 1.2rem; }
            .header div { display: flex; width: 100%; justify-content: flex-start; gap: 10px; }
            .header .btn-action { margin: 0; font-size: 0.75rem; padding: 6px 12px; }

            .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            
            #uiet-specs[style*="display: none"], #uiet-specs[style*="display:none"],
            #finance-specs[style*="display: none"], #finance-specs[style*="display:none"] { display: none !important; }

            #uiet-specs[style*="display: grid"], #uiet-specs[style*="display:grid"],
            #finance-specs[style*="display: grid"], #finance-specs[style*="display:grid"] { display: contents !important; }

            .data-group { padding: 12px 15px; border-left-width: 3px; grid-column: span 2; }
            .data-group label { font-size: 0.65rem; }
            .data-group .value { font-size: 1rem; word-break: normal; overflow-wrap: break-word; }

            .details-grid > .data-group:nth-of-type(1) { order: 1; } 
            .details-grid > .data-group:nth-of-type(2) { order: 2; } 
            .details-grid > .data-group:nth-of-type(3) { order: 3; } 
            .details-grid > .data-group:nth-of-type(4) { order: 4; } 
            
            #uiet-specs > .data-group:nth-of-type(1) { order: 5; }   
            #uiet-specs > .data-group:nth-of-type(2) { order: 6; }   

            #finance-specs > .data-group:nth-of-type(1) { order: 7; grid-column: span 1; } 
            .details-grid > .data-group.highlight { order: 8; grid-column: span 2; }       
            
            .details-grid:has(#finance-specs[style*="display: grid"]) > .data-group.highlight,
            .details-grid:has(#finance-specs[style*="display:grid"]) > .data-group.highlight { grid-column: span 1; }

            #hostel-spec { order: 9; } 
            #finance-specs > .data-group:nth-of-type(2) { order: 10; } 
            
            .btn-download { padding: 12px; font-size: 0.85rem; }
            .modal-content { padding: 20px; width: 95%; max-height: 90vh; overflow-y: auto; }
            .close-ticket-btn { top: 15px; right: 20px; font-size: 2rem; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="btn-action home-btn" style="position: absolute; top: 30px; left: 30px; border-color: rgba(255,255,255,0.2); color: white;" title="Return Home"><i class="fa-solid fa-house"></i></a>

    <div class="dashboard-wrapper" id="dashboard" style="display: none;">
        <!-- PROFILE DATA GRID -->
        <div class="glass-panel">
            <div class="header">
                <h1>Agent Data Matrix</h1>
                <div>
                    <button class="btn-action btn-edit" onclick="openEditModal()"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                    <button class="btn-action btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="details-grid">
                <div class="data-group"><label><i class="fa-solid fa-user"></i> Agent Name</label><div class="value" id="d-name">--</div></div>
                <div class="data-group"><label><i class="fa-solid fa-envelope"></i> Email Link</label><div class="value" id="d-email">--</div></div>
                <div class="data-group"><label><i class="fa-solid fa-phone"></i> Comms (Phone)</label><div class="value" id="d-phone">--</div></div>
                <div class="data-group"><label><i class="fa-solid fa-building-columns"></i> Institution</label><div class="value" id="d-college">--</div></div>
                
                <div id="uiet-specs" style="display: none; grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="data-group"><label><i class="fa-solid fa-code-branch"></i> Branch & Year</label><div class="value" id="d-branch">--</div></div>
                    <div class="data-group"><label><i class="fa-solid fa-id-badge"></i> Roll Number</label><div class="value" id="d-roll">--</div></div>
                </div>

                <div class="data-group highlight"><label><i class="fa-solid fa-shield"></i> Clearance Status</label><div class="value" id="d-payment">--</div></div>
                <div class="data-group" id="hostel-spec"><label><i class="fa-solid fa-bed"></i> Hostel Allocation</label><div class="value" id="d-hostel">--</div></div>
                
                <div id="finance-specs" style="display: none; grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="data-group"><label><i class="fa-solid fa-indian-rupee-sign"></i> Amount Settled</label><div class="value" id="d-amount">--</div></div>
                    <div class="data-group"><label><i class="fa-solid fa-file-invoice"></i> UTR Reference</label><div class="value" id="d-utr">--</div></div>
                </div>
            </div>

            <div id="missing-utr-section" style="display: none;">
                <div class="utr-form">
                    <h3 style="margin-top: 0; color: var(--brand-red);">Payment Required</h3>
                    <p style="color: #bbb; font-size: 0.9rem; margin-bottom: 15px;">You have a pending clearance fee of <strong id="pending-amount" style="color: white;">--</strong>. Please complete the UPI payment and submit the UTR to generate your pass.</p>
                    <input type="text" id="dash-utr" placeholder="12-Digit UTR Number" pattern="[0-9]{12}">
                    <button class="btn-download" style="margin-top: 0; padding: 12px;" onclick="submitDashUtr()">Submit Verification</button>
                </div>
            </div>
        </div>

        <!-- PASS DASHBOARD STUB -->
        <div class="glass-panel ticket-wrapper" id="ticket-render-area">
            <!-- Injected elements -->
        </div>
    </div>

    <!-- FULLSCREEN TICKET MODAL -->
    <div class="ticket-modal-container" id="pass-modal">
        <i class="fa-solid fa-xmark close-ticket-btn" onclick="closeTicketModal()"></i>
        
        <!-- Clean PDF Container with NO padding/borders to ruin export -->
        <div id="pdf-ticket" style="position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: transparent;">
            <!-- Ticket injected here by JS -->
        </div>

        <button class="btn-download" style="max-width: 300px; margin-top: 35px;" onclick="downloadTicket()">
            <i class="fa-solid fa-download"></i> Download Pass
        </button>
    </div>

    <!-- PROFILE MODIFICATION WINDOW -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h2>Edit Profile</h2>
            <div class="form-group"><label>Full Name</label><input type="text" id="edit-name"></div>
            <div class="form-group"><label>Phone Number</label><input type="text" id="edit-phone"></div>
            
            <div id="edit-ext-details" style="display: none;">
                <div class="form-group"><label>College Name</label><input type="text" id="edit-college"></div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="edit-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div id="edit-uiet-specs" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Branch</label>
                    <select id="edit-branch">
                        <option value="CSE">CSE</option><option value="ECE">ECE</option>
                        <option value="ME">ME</option><option value="BT">BT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <select id="edit-year">
                        <option value="1st">1st Year</option><option value="2nd">2nd Year</option>
                        <option value="3rd">3rd Year</option><option value="4th">4th Year</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: span 2;"><label>Roll Number</label><input type="text" id="edit-roll"></div>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button class="btn-action btn-logout" style="flex: 1; margin: 0;" onclick="closeEditModal()">Cancel</button>
                <button class="btn-action btn-edit" style="flex: 1; margin: 0;" onclick="saveProfileUpdates()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('esummit_token');
        let currentUserData = null;

        if (!token) window.location.href = "register.html";

        async function loadProfile() {
            try {
                const res = await fetch(`${API_URL}/auth/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();

                if (result.success) {
                    const user = result.data;
                    const order = result.order;
                    currentUserData = user;
                    
                    document.getElementById('dashboard').style.display = 'grid';
                    
                    document.getElementById('d-name').innerText = user.fullName;
                    document.getElementById('d-email').innerText = user.email;
                    document.getElementById('d-phone').innerText = user.phoneNumber;
                    document.getElementById('d-college').innerText = user.collegeName;
                    
                    document.getElementById('d-payment').innerText = user.paymentStatus.toUpperCase();
                    if(user.paymentStatus === 'Success') document.getElementById('d-payment').style.color = '#2ecc71';
                    else document.getElementById('d-payment').style.color = 'var(--brand-yellow)';

                    if(user.delegateStatus === 'yes') {
                        document.getElementById('uiet-specs').style.display = 'grid';
                        document.getElementById('d-branch').innerText = `${user.branch || 'N/A'} / ${user.year || 'N/A'}`;
                        document.getElementById('d-roll').innerText = user.rollNo || 'N/A';
                        
                        document.getElementById('hostel-spec').style.display = 'none';
                        document.getElementById('finance-specs').style.display = 'none';
                        document.getElementById('missing-utr-section').style.display = 'none';
                    } else {
                        document.getElementById('uiet-specs').style.display = 'none';
                        document.getElementById('hostel-spec').style.display = 'block';
                        
                        const hostelDisplay = document.getElementById('d-hostel');
                        if (user.needHostel) {
                            if (user.hostelAllocated) {
                                hostelDisplay.innerText = `ALLOCATED: ${user.allocatedHostelName || 'TBD'}`;
                                hostelDisplay.style.color = '#2ecc71';
                            } else {
                                hostelDisplay.innerText = 'WAITLISTED / PENDING';
                                hostelDisplay.style.color = 'var(--text-white)';
                            }
                        } else {
                            hostelDisplay.innerText = 'NOT REQUESTED';
                            hostelDisplay.style.color = 'var(--text-white)';
                        }
                        
                        if (order) {
                            document.getElementById('finance-specs').style.display = 'grid';
                            document.getElementById('d-amount').innerText = `₹${order.amountCalculated}`;
                            document.getElementById('d-utr').innerText = order.utrNumber;
                        } else if (user.paymentStatus === 'Pending') {
                            const expectedFee = 300 + (user.needHostel ? 700 : 0);
                            document.getElementById('pending-amount').innerText = `₹${expectedFee}`;
                            document.getElementById('missing-utr-section').style.display = 'block';
                        }
                    }

                    // --- NEW MODAL TICKET GENERATION ---
                    const ticketArea = document.getElementById('ticket-render-area');
                    const pdfTicket = document.getElementById('pdf-ticket');

                    if (user.paymentStatus === 'Success' && user.ticketId) {
                        
                        // Prep Dashboard Access Button
                        ticketArea.innerHTML = `
                            <div style="text-align: center;">
                                <i class="fa-solid fa-ticket" style="font-size: 3.5rem; color: var(--brand-yellow); margin-bottom: 20px;"></i>
                                <h2 style="margin: 0 0 10px 0; color: white; letter-spacing: 2px;">PASS GRANTED</h2>
                                <p style="color: #aaa; margin-bottom: 25px; font-size: 0.9rem;">Your official E-Summit 2026 digital matrix pass is ready for deployment.</p>
                                <button class="btn-download" style="width: auto; padding: 12px 35px;" onclick="openTicketModal()">
                                    <i class="fa-solid fa-eye"></i> View Pass
                                </button>
                            </div>
                        `;

                       // Clean ID and split into chunks WITHOUT adding X's
                        let cleanId = user.ticketId.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                        let id1 = cleanId.substring(0, 2);
                        let id2 = cleanId.substring(2, 4);
                        let id3 = cleanId.substring(4, 6);
                        let id4 = cleanId.substring(6, 10); // This will just grab whatever characters are left

                        // Inject the clean HTML into the hidden modal for future PDF extraction
                        pdfTicket.innerHTML = `
                            <img src="ticket.png" style="width: 100%; height: auto; display: block; border-radius: 12px;" crossorigin="anonymous">
                            
                            <!-- Name Overlay (Right Stub) using Montserrat -->
                            <div style="position: absolute; top: 26.5%; right: 0%; color: #fff; font-size: clamp(0.75rem, 1.6vw, 0.8rem); font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; width: 22%; text-align: left; word-wrap: break-word; letter-spacing: 1px;">
                                ${user.fullName}
                            </div>

                            <!-- 4 Bottom Boxes Overlay using Golden Gradient -->
                            <div class="id-box-overlay golden-gradient" style="bottom: 15%; height: 11%; left: 4.8%; width: 10.3%;">${id1}</div>
                            <div class="id-box-overlay golden-gradient" style="bottom: 15%; height: 11%; left: 16.2%; width: 10.3%;">${id2}</div>
                            <div class="id-box-overlay golden-gradient" style="bottom: 15%; height: 11%; left: 27.6%; width: 10.3%;">${id3}</div>
                            <div class="id-box-overlay golden-gradient" style="bottom: 15%; height: 11%; left: 40.5%; width: 13.5%;">${id4}</div>

                            <!-- QR Code Overlay -->
                            <div id="qrcode" style="position: absolute; bottom: 8.5%; right: 5.5%; background: #fff; padding: 5px; border-radius: 6px;"></div>
                        `;

                        // Generate the QR Code dynamically inside the modal
                        const qrContainer = document.getElementById("qrcode");
                        new QRCode(qrContainer, {
                            text: user.ticketId,
                            width: 160, height: 160,
                            colorDark : "#000000", colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });

                        setTimeout(() => {
                            const canvas = qrContainer.querySelector('canvas');
                            if(canvas) {
                                const imgData = canvas.toDataURL("image/png");
                                qrContainer.innerHTML = `<img src="${imgData}" style="width:100%; height:100%; display:block;" />`;
                            }
                        }, 120);

                    } else {
                        ticketArea.innerHTML = `
                            <div class="lock-screen">
                                <i class="fa-solid fa-lock"></i>
                                <h3>ACCESS LOCKED</h3>
                                <p>Pass generation pending finance verification. Keep this frequency open.</p>
                            </div>
                        `;
                    }
                } else { logout(); }
            } catch (err) { console.error(err); }
        }

        function openTicketModal() { document.getElementById('pass-modal').classList.add('active'); }
        function closeTicketModal() { document.getElementById('pass-modal').classList.remove('active'); }

        async function submitDashUtr() {
            const utrNumber = document.getElementById('dash-utr').value;
            if(!utrNumber || utrNumber.length !== 12) return alert("UTR must be exactly 12 digits.");

            try {
                const res = await fetch(`${API_URL}/payments/submit-utr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ utrNumber })
                });
                const data = await res.json();
                if(data.success) {
                    alert("UTR Submitted successfully.");
                    loadProfile();
                } else { alert(data.error); }
            } catch (err) { alert("Execution exception."); }
        }

        function openEditModal() {
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('edit-name').value = currentUserData.fullName;
            document.getElementById('edit-phone').value = currentUserData.phoneNumber;

            if(currentUserData.delegateStatus === 'no') {
                document.getElementById('edit-ext-details').style.display = 'block';
                document.getElementById('edit-uiet-specs').style.display = 'none';
                document.getElementById('edit-college').value = currentUserData.collegeName;
                document.getElementById('edit-gender').value = currentUserData.gender || 'Male';
            } else {
                document.getElementById('edit-ext-details').style.display = 'none';
                document.getElementById('edit-uiet-specs').style.display = 'grid';
                document.getElementById('edit-branch').value = currentUserData.branch || 'CSE';
                document.getElementById('edit-year').value = currentUserData.year || '1st';
                document.getElementById('edit-roll').value = currentUserData.rollNo || '';
            }
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function saveProfileUpdates() {
            const payload = {
                fullName: document.getElementById('edit-name').value,
                phoneNumber: document.getElementById('edit-phone').value
            };

            if(currentUserData.delegateStatus === 'no') {
                payload.collegeName = document.getElementById('edit-college').value;
                payload.gender = document.getElementById('edit-gender').value;
            } else {
                payload.branch = document.getElementById('edit-branch').value;
                payload.year = document.getElementById('edit-year').value;
                payload.rollNo = document.getElementById('edit-roll').value;
            }

            try {
                const res = await fetch(`${API_URL}/auth/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) { closeEditModal(); loadProfile(); } else { alert(data.error); }
            } catch (err) { alert("Network modification failure."); }
        }

        function downloadTicket() {
    const element = document.getElementById('pdf-ticket');
    
    // Briefly force a fixed width for consistent high-res generation
    const originalWidth = element.style.width;
    element.style.width = '1100px'; 

    // Dynamically calculate the exact height based on the image's aspect ratio
    const exactWidth = element.offsetWidth;
    const exactHeight = element.offsetHeight;

    const opt = {
        margin: 0,
        filename: 'ESummit_26_Pass.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { 
            scale: 2,
            useCORS: true, 
            backgroundColor: null 
        },
        jsPDF: { 
            unit: 'px', // Switched to pixels
            format: [exactWidth, exactHeight], // PDF will be exactly the size of the image
            orientation: exactWidth > exactHeight ? 'landscape' : 'portrait' 
        }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        // Revert to responsive width after generating
        element.style.width = originalWidth;
    });
}
        function logout() {
            localStorage.removeItem('esummit_token');
            window.location.href = "register.html";
        }

        loadProfile();
    </script>
